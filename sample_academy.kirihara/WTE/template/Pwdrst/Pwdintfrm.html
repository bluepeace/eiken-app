<body id="user" class="drawer drawer--right">
  <TMPL_INCLUDE NAME="../include/body.html">
    <TMPL_INCLUDE NAME="../include/header.html">

      <main role="main" class="wt_main">
        <section class="wt_sec_bg_1">
          <div class="container">
            <div class="row">
              <div class="col-12 col-md-10 offset-md-1">
                <h2 class="text-center">パスワード・リセット</h2>
            <div class="wt_form wt_form_layer">

            <p class="text-center">登録されているパスワードを再設定します。</p>

            <form method="post" action="%CGI_URL%">
              <input type="hidden" name="m" value="pwdintset" />
              <input type="hidden" name="pkey" value="%pkey%" />
              <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
                  
              <div class="form-group">
                <label for="member_pass" class="required %member_pass_err%">パスワード</label>
                <input type="password" id="member_pass" name="member_pass" value="%member_pass%" placeholder="パスワードを入力してください（8～20文字）" class="form-control %member_pass_err%" />
              </div>
              <div class="form-group">
                <label for="member_pass2" class="required %member_pass2_err%">パスワード（確認用）</label>
                <input type="password" id="member_pass2" name="member_pass2" value="%member_pass2%" placeholder="確認の為、再度パスワードを入力してください" class="form-control %member_pass2_err%" />
                <ul class="note">
                  <li>半角英数字8～20文字でパスワードを入力してください。</li>
                </ul>
              </div>
              <div class="text-center">
                <input type="submit" value="再設定" name="setBtn" class="btn btn-primary rounded-pill wt_btn" />
              </div>
            </form>
            </div>
          </div>
        </div>
      </div>
    </section>
   </main>
  <!--footer.html読み込み-->
  <TMPL_INCLUDE NAME="../include/footer.html">
<TMPL_INCLUDE NAME="../include/foot.html">
</body>
</html>
