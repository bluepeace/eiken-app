<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Reset Password</title>
<TMPL_INCLUDE NAME="../include/head.html">
<style>
.required::after {content: "*required";}
</style>
</head>
<body id="user">

<TMPL_INCLUDE NAME="../include/header.html">
  <div id="sb-site">

    <!-- content section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-xs-12 col-md-8 col-md-offset-2">
            <h1>Reset Password</h1>
            <p class="text-center">Enter the email address with your account and we’ll send you a reset link.</p>

            <form method="post" action="%CGI_URL%" class="wform">
              <input type="hidden" name="m" value="cptset" />
              <input type="hidden" name="pkey" value="%pkey%" />
              <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>

              <div class="form-group">
                <label for="member_email" class="required %member_email_err%">Email</label>
                <input type="text" id="member_email" name="member_email" value="%member_email%" class="form-control %member_email_err%" />
              </div>


                <div class="text-center">
                  <input type="submit" value="Send reset link" name="setBtn" class="btn btn-primary" />
                </div>
              </form>
              <!--フォームend-->

          </div>
        </div>
      </div>
    </section>
  <!--footer.html読み込み-->
  <TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
  <script src="%static_url%/js/dom.js"></script>
  <script src="%static_url%/js/form.js"></script>
  <script src="%static_url%/js/inputlimit.js"></script>
</body>
</html>
