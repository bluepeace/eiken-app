<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Reset Password</title>
<TMPL_INCLUDE NAME="../include/head.html">
<style>
.required::after {content: "*required";}
</style>
</head>
<body id="user">

<TMPL_INCLUDE NAME="../include/header.html">
  <div id="sb-site">

    <!-- content section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-xs-12 col-md-8 col-md-offset-2">
            <h1>Reset Password</h1>

            <p class="text-center">Reset the registered password.</p>

            <form method="post" action="%CGI_URL%" class="wform">
              <input type="hidden" name="m" value="pwdintset" />
              <input type="hidden" name="pkey" value="%pkey%" />
              <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
                  
              <div class="form-group">
                <label for="member_pass" class="required %member_pass_err%">Password</label>
                <input type="password" id="member_pass" name="member_pass" value="%member_pass%" class="form-control %member_pass_err%" />
              </div>
              <div class="form-group">
                <label for="member_pass2" class="required %member_pass2_err%">Password（Confirm）</label>
                <input type="password" id="member_pass2" name="member_pass2" value="%member_pass2%" class="form-control %member_pass2_err%" />
                <ul class="note">
                  <li>Fill in your new password from 8 to 12 characters</li>
                </ul>
              </div>
              <div class="text-center">
                <input type="submit" value="send" name="setBtn" class="btn btn-primary" />
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
</body>
</html>
