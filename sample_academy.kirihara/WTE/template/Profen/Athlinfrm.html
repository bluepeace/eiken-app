<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>%product_name%</title>
<meta name="robots" content="noindex,nofollow" />
<TMPL_INCLUDE NAME="./include/head_prof.html">
</head>
<body id="instructor" class="instructor">

<TMPL_INCLUDE NAME="./include/header_prof.html">
  <div id="sb-site">
   
    <!-- schedule section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-xs-12 col-md-8 col-md-offset-2">
            <h1>Login for teachers</h1>
            <p class="text-center">Enter your email address and password for %product_name%</p>
            
            <form action="%CGI_URL%" class="wform" method="post">
              <input type="hidden" name="m" value="athlinsmt" />
              <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
              <div class="form-group">
                <label for="prof_email" class="%prof_email_err% required">Email</label>
                <input type="text" id="prof_email" name="prof_email" value="%prof_email%" class="form-control inputlimit_ascii %prof_email_err%" />
              </div>

              <div class="form-group">
                <label for="prof_pass" class="%prof_pass_err% required">Password</label>
                <input type="password" id="prof_pass" name="prof_pass" value="%prof_pass%" class="form-control %prof_pass_err%" />
              </div>

              <fieldset class="form-group">
                <div class="form-check">
                  <label for="auto_login_enable"><input type="checkbox" id="auto_login_enable" name="auto_login_enable" value="1" %auto_login_enable_1_checked% />Stay logged in</label>
                </div>
              </fieldset>
              <div class="text-center"><input type="submit" value="Login" class="btn btn-primary" /></div>
            </form>
          </div>
        </div>
      </div>
    </section>
    
    <!-- foot section -->
<TMPL_INCLUDE NAME="./include/footer_prof.html">
  </div>
<TMPL_INCLUDE NAME="./include/foot_prof.html">
  
</body>
</html>
