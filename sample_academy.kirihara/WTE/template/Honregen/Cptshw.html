<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Sign Up</title>
<meta name="description" content="" />
<meta name="keywords" content="%product_name%" />
<TMPL_INCLUDE NAME="../include/head.html">
</head>
<body id="user">

<TMPL_INCLUDE NAME="../include/header.html">
  <div id="sb-site">

    <!-- content section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-xs-12 col-md-8 col-md-offset-2">
            
            <h1>Sign Up</h1>
            <div class="wform">
              <div class="progresscont">
                <div class="progresstxt">
                  <div class="row">
                    <div class="col-xs-3 text-center">
                      Input
                      <div class="progressnum on">1</div>
                    </div>
                    <div class="col-xs-3 text-center">
                      Confirm
                      <div class="progressnum on">2</div>
                    </div>
                    <div class="col-xs-3 text-center">
                      Check Email
                      <div class="progressnum on">3</div>
                    </div>
                    <div class="col-xs-3 text-center">
                      Complete
                      <div class="progressnum on">4</div>
                    </div>
                  </div>
                </div>
                <div class="progress">
                  <div class="progress-bar" role="progressbar" style="width:100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
              </div>
              <p>Your registration is now completed. Please login to my page and use the service!</p>
              <form action="%ssl_host_url%/WTE/mypage.cgi" method="post">
                <input type="hidden" name="m" value="athlinsmt" />
                <input type="hidden" name="s" value="%session_seller_id%" />
                <input type="hidden" name="target" value="%target%" />
                <input type="hidden" name="redirect" value="%redirect%" />
                <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
              
                <div class="form-group">
                  <label for="member_email" class="%member_email_err%">Email Address</label>
                  <input type="text" id="member_email" name="member_email" value="%member_email%" class="form-control inputlimit_ascii %member_email_err%" />
                </div>
                    
                <div class="form-group">
                  <label for="member_pass" class="%member_pass_err%">Password</label>
                  <input type="password" id="member_pass" name="member_pass" value="%member_pass%" class="form-control %member_pass_err%" />
                </div>
                    
                <fieldset class="form-group">
                  <div class="form-check">
                    <label for="auto_login_enable"><input type="checkbox" id="auto_login_enable" name="auto_login_enable" value="1" />Stay logged in</label>
                  </div>
                </fieldset>
                  
                <div class="text-center"><input type="submit" value="Sign In" class="btn btn-primary" /></div>
                <div class="text-center">
                  <input type="button" name="backBtn" value="&raquo; Forget your password" onclick="document.location.href='/WTE/pwdrst.cgi'" class="btn btn-link" />
                </div>
              </form>
              
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
</body>
</html>
