<body id="user" class="drawer drawer--right">
  <TMPL_INCLUDE NAME="../include/body.html">
    <TMPL_INCLUDE NAME="../include/header.html">

      <main role="main" class="wt_main">
        <section class="wt_sec_bg_1">
          <div class="container">
            <div class="row">
              <div class="col-12 col-md-8 offset-md-2">
                <h2 class="text-center">お問い合わせ</h2>

                <div class="wt_form wt_form_layer mb-5">
                <p>以下のお問い合わせ内容でよろしいですか。問題なければ「送信」ボタンを押してください。</p>
                <form method="post" action="%CGI_URL%">
                <input type="hidden" name="m" value="inqcptset" />
                <input type="hidden" name="pkey" value="%pkey%" />
                <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>

                  <table class="table">
                    <tr>
                      <th>ニックネーム</th>
                      <td>%member_handle% 様</td>
                    </tr>
                    <tr>
                      <th>メールアドレス</th>
                      <td>%member_email%</td>
                    </tr>
                    <tr>
                      <th>お問い合わせ項目</th>
                      <td>%inq_title_caption%</td>
                    </tr>
                    <tr>
                      <th>お問い合わせ内容</th>
                      <td>%inq_cont%</td>
                    </tr>
                  </table>

                <div class="text-center">
                  <input type="submit" name="setBtn" value="送信する" class="btn btn-primary rounded-pill wt_btn" />
                </div>
                <div class="text-center">
                  <input type="button" name="backBtn" value="&laquo; 入力内容を修正する" onclick="javascript:document.location.href='%CGI_URL%?m=inqfrmshw&amp;pkey=%pkey%'" class="btn btn-link" />
                </div>

              </form>
                </div>
              </div>
            </div>
          </div>
        </section>
