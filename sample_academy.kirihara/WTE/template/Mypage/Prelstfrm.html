<body id="user" class="drawer drawer--right">
  <TMPL_INCLUDE NAME="../include/body.html">
    <TMPL_INCLUDE NAME="../include/header.html">

      <main role="main" class="wt_main">
        <section class="wt_sec_bg_1">
          <div class="container">
            <div class="row">
              <div class="col-12 col-md-8 offset-md-2">
                <h2 class="text-center">レッスン進捗履歴</h2>

          <p class="text-center">先生からのレッスン進捗報告がこちらに表示されます。</p>
          </div>
        </div>
        <div class="row">
          <div class="col-xs-12 col-md-12">
            <div class="wform">
          <nav aria-label="..." class="text-center">
            <ul class="wt_pagination">
              <TMPL_IF NAME="prev_url">
              <li class="page-item">
                <a href="%prev_url%" class="page-link fas fa-chevron-left"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-left"></i>
              </li>
              </TMPL_IF>
              <TMPL_LOOP NAME="page_loop">
              <TMPL_IF NAME="current">
              <li class="page-item active">
                <span class="page-link">%page%</span>
              </li>
              <TMPL_ELSE>
              <li class="page-item">
                <a href="%url%" class="page-link">%page%</a>
              </li>
              </TMPL_IF>
              </TMPL_LOOP>
              <TMPL_IF NAME="next_url">
              <li class="page-item">
                <a href="%next_url%" class="page-link fas fa-chevron-right"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-right"></i>
              </li>
              </TMPL_IF>
            </ul>
          </nav>
              
              <table class="table">
                <tr>
                  <th class="" colspan="2">投稿者</th>
                  <th class="">投稿日時</th>
                  <th class="">本文</th>
                </tr>
                <TMPL_LOOP NAME="list_loop">
                <tr>
                  <td>
                    <TMPL_IF NAME="prof_id">
                      <TMPL_IF NAME="prof_logo">
                        <img src="%prof_logo_1_url%?%epoch%" width="%prof_logo_1_w%" height="%prof_logo_1_h%" alt="" />
                      <TMPL_ELSE>
                          &nbsp;
                      </TMPL_IF>
                    <TMPL_ELSE>
                        <TMPL_IF NAME="member_logo">
                          <img src="%member_logo_1_url%?%epoch%" width="%member_logo_1_w%" height="%member_logo_1_h%" alt="" />
                        <TMPL_ELSE>
                          &nbsp;
                        </TMPL_IF>
                    </TMPL_IF>
                  </td>
                  <td>
                    <TMPL_IF NAME="prof_id">
                      %prof_handle%
                    <TMPL_ELSE>
                      %member_handle%
                    </TMPL_IF>
                  </td>
                  <td>%prep_cdate_Y%/%prep_cdate_n%/%prep_cdate_j%（%prep_cdate_wj%）%prep_cdate_G%:%prep_cdate_i%</td>
                  <td>%prep_content%</td>
                </tr>
                </TMPL_LOOP>
              </table>
          <nav aria-label="..." class="text-center">
            <ul class="wt_pagination">
              <TMPL_IF NAME="prev_url">
              <li class="page-item">
                <a href="%prev_url%" class="page-link fas fa-chevron-left"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-left"></i>
              </li>
              </TMPL_IF>
              <TMPL_LOOP NAME="page_loop">
              <TMPL_IF NAME="current">
              <li class="page-item active">
                <span class="page-link">%page%</span>
              </li>
              <TMPL_ELSE>
              <li class="page-item">
                <a href="%url%" class="page-link">%page%</a>
              </li>
              </TMPL_IF>
              </TMPL_LOOP>
              <TMPL_IF NAME="next_url">
              <li class="page-item">
                <a href="%next_url%" class="page-link fas fa-chevron-right"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-right"></i>
              </li>
              </TMPL_IF>
            </ul>
          </nav>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

<TMPL_INCLUDE NAME="../include/footer.html">
