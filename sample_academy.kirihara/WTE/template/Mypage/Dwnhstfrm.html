<body id="user" class="drawer drawer--right">
  <TMPL_INCLUDE NAME="../include/body.html">
    <TMPL_INCLUDE NAME="../include/header.html">

      <main role="main" class="wt_main">
        <section class="wt_sec_bg_1">
          <div class="container">
            <div class="row">
              <div class="col-12 col-md-8 offset-md-2">
                <h2 class="text-center">ダウンロード商品購入履歴</h2>

          <p class="text-center">これまで購入したダウンロード商品の一覧です。</p>

          <div class="wform">
           
          <nav aria-label="..." class="text-center">
            <ul class="wt_pagination">
              <TMPL_IF NAME="prev_url">
              <li class="page-item">
                <a href="%prev_url%" class="page-link fas fa-chevron-left"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-left"></i>
              </li>
              </TMPL_IF>
              <TMPL_LOOP NAME="page_loop">
              <TMPL_IF NAME="current">
              <li class="page-item active">
                <span class="page-link">%page%</span>
              </li>
              <TMPL_ELSE>
              <li class="page-item">
                <a href="%url%" class="page-link">%page%</a>
              </li>
              </TMPL_IF>
              </TMPL_LOOP>
              <TMPL_IF NAME="next_url">
              <li class="page-item">
                <a href="%next_url%" class="page-link fas fa-chevron-right"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-right"></i>
              </li>
              </TMPL_IF>
            </ul>
          </nav>
            
            <table class="table">
              <tr>
                <th class="w5">ID</th>
                <th class="w25">購入日付</th>
                <th class="w5">種別</th>
                <th class="w40">商品名</th>
                <th class="w10">チケット</th>
                <th class="w15">状態</th>
              </tr>
              <TMPL_LOOP NAME="list_loop">
              <tr>
                <td>%dsl_id%</td>
                <td>%dsl_cdate_Y%年%dsl_cdate_n%月%dsl_cdate_j%日（%dsl_cdate_wj%）</td>
                <td>
                  <TMPL_IF NAME="dwn_type_1">動画</TMPL_IF><TMPL_IF NAME="dwn_type_2">PDF</TMPL_IF>
                </td>
                <td>
                  <TMPL_IF NAME="dwn_status_1">
                    <a href="%CGI_URL%?m=dwndtlfrm&amp;dwn_id=%dwn_id%">%dwn_title%</a>
                  <TMPL_ELSE>
                    %dwn_title%
                  </TMPL_IF>
                </td>
                <td>%dsl_point_with_comma%pt</td>
                <td>
                  <TMPL_IF NAME="dsl_qualified">
                    <div class="button listbuttun"><a href="%CGI_URL%?m=dslfledwn&amp;dsl_id=%dsl_id%" target="_blank" class="green">利用可能</a></div>
                  <TMPL_ELSE>
                    有効期限切れ
                  </TMPL_IF>
                </td>
              </tr>
              </TMPL_LOOP>
            </table>

          <nav aria-label="..." class="text-center">
            <ul class="wt_pagination">
              <TMPL_IF NAME="prev_url">
              <li class="page-item">
                <a href="%prev_url%" class="page-link fas fa-chevron-left"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-left"></i>
              </li>
              </TMPL_IF>
              <TMPL_LOOP NAME="page_loop">
              <TMPL_IF NAME="current">
              <li class="page-item active">
                <span class="page-link">%page%</span>
              </li>
              <TMPL_ELSE>
              <li class="page-item">
                <a href="%url%" class="page-link">%page%</a>
              </li>
              </TMPL_IF>
              </TMPL_LOOP>
              <TMPL_IF NAME="next_url">
              <li class="page-item">
                <a href="%next_url%" class="page-link fas fa-chevron-right"></a>
              </li>
              <TMPL_ELSE>
              <li class="page-item disabled">
                <i class="page-link fas fa-chevron-right"></i>
              </li>
              </TMPL_IF>
            </ul>
          </nav>
       
        </div>
                  
              </div>
            </div>
          </div>
        </section>
      </main>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">">
</body>
</html>
