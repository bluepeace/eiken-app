<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>企業・学校メニュー</title>
  <TMPL_INCLUDE NAME="include_head.html">
</head>
<body class="hold-transition login-page">
  <div class="login-box">
    <div class="login-logo mb-2">
      <a href="https://academy.kirihara.co.jp/" class="brand-link">
      <img src="https://academy.kirihara.co.jp/assets/img/common/logo.svg" class="w-50 h-auto">
      </a>
	  <h5 class="m-3">企業様・学校様専用フォーム</h5>
    </div>
    <div class="card">
    <div class="card-body login-card-body">
		<p class="login-box-msg text-sm">ログインしてください</p>

      <TMPL_IF NAME="errs">
        <div class="text-danger">
          %errs%
        </div>
      </TMPL_IF>

<form action="%CGI_URL%" method="post" target="_top">
	<input type="hidden" name="m" value="athlinsmt" />
	<div class="input-group mb-3 has-feedback %seller_email_err%">
		<input type="text" id="seller_email" name="seller_email" value="%seller_email%" size="20" class="form-control" placeholder="メールアドレス">
		<div class="input-group-append">
		<div class="input-group-text">
		<span class="fas fa-envelope form-control-feedback" style="line-height: inherit;"></span>
	  </div>
	  </div>
	  </div>

	  
	  <div class="input-group mb-3 has-feedback %seller_pass_err%">
		<input type="password" id="seller_pass" name="seller_pass" value="" size="20" class="form-control" placeholder="パスワード">
		<div class="input-group-append">
		<div class="input-group-text">
		<span class="fas fa-lock form-control-feedback" style="line-height: inherit;"></span>
	  </div>
	  </div>
	  </div>


	  <div class="form-group text-sm">
		<input type="checkbox" id="auto_logon_enable" name="auto_logon_enable" value="1" class="checkbox" checked>
		<label for="auto_logon_enable">次回から自動でログインする。</label>
	  </div>

	  
	  <div class="form-group">
        <input type="submit" name="setBtn" value="ログイン" class="btn btn-info btn-block " />
        </div>

    </form>
  </div>
  </div>
  </div>

  <!-- フォーム二重投稿禁止 -->
  <script src="%static_url%/js/form-guard.js"></script>
  <!-- 入力値半角変換 -->
  <script src="%static_url%/js/input-limit.js"></script>

  <TMPL_INCLUDE NAME="include_foot.html">
</body>
</html>
