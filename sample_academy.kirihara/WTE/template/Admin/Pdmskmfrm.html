  <script type="text/javascript">
    (function () {

      var processing = false;

      $(document).ready(function () {
        var pdm_status_toggle = $('#pdm_status_toggle');
        // clickイベントリスナー
        pdm_status_toggle.click(function (event) {
          event.preventDefault();
          if (processing === true) {
            return;
          }
          reqPdmTglSet($(this));
        });
      });

      function reqPdmTglSet(tgl) {
        var url = tgl.attr('href');
        if (!url) {
          return;
        }
        var res = window.confirm("本当にステータスを変更しても良いですか？");
        if (res === false) {
          return;
        }
        //
        tgl.text('処理中...');
        $.ajax({
          url: url,
          type: 'GET',
          cache: false,
          dataType: 'text',
          success: function (data) {
            if (data.match(/^1/)) {
              $('#pdm_status_caption').text('支払中');
              $('#pdm_status_toggle').text('支払済にする');
            } else if (data.match(/^2/)) {
              $('#pdm_status_caption').text('支払済');
              $('#pdm_status_toggle').text('支払中に戻す');
            } else {
              tgl.text('処理エラー');
            }
            processing = false;
          },
          error: function (jqXHR, textStatus, errorThrown) {
            tgl.text('処理エラー');
            processing = false;
          }
        });
      }

    })();
  </script>
