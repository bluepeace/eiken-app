<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ja" lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="Content-Language" content="ja" />
<meta http-equiv="Content-Style-Type" content="text/css" />
<meta http-equiv="Content-Script-Type" content="text/javascript" />
<title>%product_name%</title>
<link href="%static_url%/css/admin/common.css" type="text/css" rel="stylesheet" />
<style type="text/css">
#dct_title { width:20em; }
</style>
<script type="text/javascript" src="%static_url%/js/dom.js"></script>
<script type="text/javascript" src="%static_url%/js/form.js"></script>
<script type="text/javascript" src="%static_url%/js/inputlimit.js"></script>
<script type="text/javascript" src="%static_url%/js/admin/ctgaddfrm.js"></script>
</head>
<body>
<h1><a href="%CGI_URL%?m=dctlstfrm">ダウンロード商品カテゴリー管理</a> - 編集</h1>
<div id="main">
<p>ダウンロード商品カテゴリー情報を編集します。必要事項を入力の上、「編集」ボタンを押してください。</p>
<TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
<form method="post" action="%CGI_URL%">
	<input type="hidden" name="m" value="dctmodset" />
	<input type="hidden" name="pkey" value="%pkey%" />
	<fieldset>
		<legend>カテゴリー情報</legend>
		<dl>
			<dt>カテゴリーID</dt>
			<dd>%dct_id%</dd>
		</dl>
		<dl>
			<dt><label for="dct_title" class="required %dct_title_err%">カテゴリー名称</label></dt>
			<dd>
				<input type="text" id="dct_title" name="dct_title" value="%dct_title%" class="text %dct_title_err%" />
				<ul class="note">
					<li><span id="dct_title_max_char_num">255</span>文字以内で入力してください。（現在の入力文字数：<span id="dct_title_char_num">0</span>文字）</li>
				</ul>
			</dd>
		</dl>
		<dl class="last">
			<dt><label for="dct_status" class="required %dct_status_err%">状態</label></dt>
			<dd>
				<select name="dct_status" id="dct_status" class="select %dct_status_err%">
					<option value="0" %dct_status_0_selected%>無効</option>
					<option value="1" %dct_status_1_selected%>有効</option>
				</select>
			</dd>
		</dl>
	</fieldset>
	<div><input type="submit" value="編集" name="setBtn" class="submit" /></div>
</form>
</div>
</body>
</html>
