<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>メールテンプレート編集 | %product_name%</title>
  <TMPL_INCLUDE NAME="include_head.html">
</head>

<body class="hold-transition sidebar-mini">
  <div class="wrapper">
    <TMPL_INCLUDE NAME="include_header.html">
      <TMPL_INCLUDE NAME="include_menu.html">

        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
          <!-- Content Header (Page header) -->
          <div class="content-header">
            <div class="container-fluid">
              <div class="row mb-2">
                <div class="col-sm-6">
                  <h1 class="m-0"><i class="fas fa-envelope text-primary"></i> メールテンプレート編集</h1>
                </div><!-- /.col -->
                <div class="col-sm-6">
                  <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="%CGI_URL%">Home</a></li>
                    <li class="breadcrumb-item active">メールテンプレート編集</li>
                  </ol>
                </div><!-- /.col -->
              </div><!-- /.row -->
            </div><!-- /.container-fluid -->
          </div>
          <!-- /.content-header -->
          <!-- Main content -->
          <section class="content">
            <div class="container-fluid">
              <div class="row">
                <div class="col-12">
                  <form method="post" action="%CGI_URL%">
                    <input type="hidden" name="m" value="tplmodset" />
                    <input type="hidden" name="pkey" value="%pkey%" />
                    <TMPL_IF NAME="errs"><div class="text-danger">%errs%</div></TMPL_IF>

                    <div class="card card-primary card-outline">
                      <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-envelope text-primary"></i> [%tmpl_id%] %tmpl_title%</h3>
                      </div>
                      <div class="card-body text-sm">
                        <div class="row">
                          <div class="col-md-12">
                            <div class="form-group ">
                              <label for="tmpl_content" class="required %tmpl_content_err%">テンプレートデータ <span class="text-danger">必須</span></label>
                              <div>
                                <textarea name="tmpl_content" id="tmpl_content" class="form-control %tmpl_content_err%" cols="80" rows="30">%tmpl_content%</textarea>
                                <ul class="note">
                                  <li><span id="tmpl_content_max_char_num">20000</span>文字以内で入力してください。</li>
                                </ul>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="card-footer text-sm">
                        <input type="submit" value="設定" name="setBtn" class="btn btn-info" />
                      </div>
                    </div>
                  </form>

                </div>
              </div>
            </div>
          </section>
        </div>
        <TMPL_INCLUDE NAME="include_footer.html">
      </div>
      <TMPL_INCLUDE NAME="include_foot.html">
  </body>
  
</html>
