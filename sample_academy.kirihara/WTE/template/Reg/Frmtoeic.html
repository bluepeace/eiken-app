<!DOCTYPE html>
<html lang=ja>

<head>
  <meta charset=utf-8>
  <meta content="IE=edge" http-equiv=X-UA-Compatible>
  <meta content="width=device-width,initial-scale=1" name=viewport>
  <title>TOEIC&reg;コース体験レッスンをお申し込みの方はこちら｜桐原書店のオンライン英会話「KIRIHARA Online Academy」</title>
  <meta name="description" content="" />
  <meta name="keywords" content="オンライン英会話,スカイプ英会話,日本人講師,日本語対応可,日本語OK,初心者向け,マンツーマン,World Talk,ワールドトーク,桐原書店,TOEIC,英検" />
  <meta property="og:title" content="無料体験レッスン・会員登録｜<TMPL_INCLUDE NAME="../include/title.html">" />
  <meta property="og:type" content="product" />
  <meta property="og:description" content="" />
  <meta property="og:url" content="https://academy.kirihara.co.jp/WTE/reg.cgi" />
  <meta property="og:image" content="https://academy.kirihara.co.jp/assets/img/ogp/ogp_register.jpg" />
  <meta property="og:site_name" content="<TMPL_INCLUDE NAME="../include/title.html">" />
  <meta property="og:locale" content="ja_JP" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@WT_Kirihara" />
  <meta name="twitter:url" content="https://academy.kirihara.co.jp/WTE/reg.cgi" />
  <meta name="twitter:title" content="無料体験レッスン・会員登録｜<TMPL_INCLUDE NAME="../include/title.html">" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image" content="https://academy.kirihara.co.jp/assets/img/ogp/ogp_register.jpg" />
  <TMPL_INCLUDE NAME="../include/head.html">
    <link rel="stylesheet" href="/assets/css/lp.css?9">
</head>

<body id="user" class="drawer drawer--right">
  <TMPL_INCLUDE NAME="../include/body.html">
<TMPL_INCLUDE NAME="../include/header_toeic.html">

  <main role="main" class="wt_main">

    <section>
        <div class="container">
            <div class="row">
                    <div class="col-12 col-md-10 offset-md-1 col-lg-8 offset-lg-2">
                        <h2 class="text-center">TOEIC&reg;スコアアップの<br class="d-block d-md-none"><strong class="txt_kiri">入り口</strong>はこちら</h2>
                        <p class="mb-5 text-left text-md-center">無料の体験レッスンをご希望の方はこちらから登録をお願いします。</p>
                        <div class="wt_form wt_form_layer">

                          <form method="post" action="%CGI_URL%">
                            <input type="hidden" name="m" value="cfmset" />
                            <input type="hidden" name="pkey" value="%pkey%" />
                            <TMPL_IF NAME="errs">
                              <p class="errs">%errs%</p>
                            </TMPL_IF>

                            <div class="form-group" style="display: none">
                              <label class="required %member_lastname_err% %member_firstname_err%">お名前</label>
                              <div class="row">
                                <div class="col-2 col-sm-1">
                                  <label for="member_lastname" class=" %member_lastname_err% %member_firstname_err%">%member_lastname_caption%：</label>
                                </div>
                                <div class="col-10 col-sm-5" style="line-height:1">
                                  <input type="text" id="member_lastname" name="member_lastname" value="%member_lastname%" placeholder="（例）山田" class="form-control %member_lastname_err%" />
                                </div>
                                <div class="col-2 col-sm-1">
                                  <label for="member_firstname" class="%member_lastname_err% %member_firstname_err%">%member_firstname_caption%：</label>
                                </div>
                                <div class="col-10 col-sm-5" style="line-height:1">
                                  <input type="text" id="member_firstname" name="member_firstname" value="%member_firstname%" placeholder="（例）太郎" class="form-control %member_firstname_err%" />
                                </div>
                              </div>
                            </div>

                            <div class="form-group">
                              <div class="row">
                                <div class="col-12 col-xl-4">
                                  <label for="member_handle" class="required %member_handle_err%">%member_handle_caption%</label>
                                </div>
                                <div class="col-12 col-xl-8">
                                  <input type="text" required="required" id="member_handle" name="member_handle" value="%member_handle%" placeholder="（例）桐原一郎" class="form-control %member_handle_err%" onclick="ga('send','event','LP','click','reg_5_toeic_form');" />
                                </div>
                              </div>
                            </div>

                            <div class="form-group">
                              <div class="row">
                                <div class="col-12 col-xl-4">
                                  <label for="member_email" class="required %member_email_err%">%member_email_caption%</label>
                                </div>
                                <div class="col-12 col-xl-8">
                                  <input type="text" required="required" id="member_email" name="member_email" value="%member_email%" placeholder="（例）yamada@example.com" class="form-control %member_email_err%" />
                                </div>
                              </div>
                            </div>

                            <div class="form-group">
                              <div class="row">
                                <div class="col-12 col-xl-4">
                                  <label for="member_pass" class="required %member_pass_err%">%member_pass_caption%</label>
                                </div>
                                <div class="col-12 col-xl-8">
                                  <input type="password" required="required" id="member_pass" name="member_pass" value="%member_pass%" placeholder="%member_pass_caption%を入力してください（8～12文字）" class="form-control %member_pass_err%" />
                                  <div class="form-group">
                                    <input type="password" id="member_pass2" name="member_pass2" value="%member_pass2%" placeholder="確認の為、再度%member_pass_caption%を入力してください" class="form-control %member_pass2_err%" />
                                  </div>
                                </div>
                              </div>
                            </div>

                            <div class="form-group" style="display:none;">
                              <label for="coupon_code" class="%coupon_code_err%">%coupon_code_caption%</label>
                              <input type="text" required="required" id="coupon_code" name="coupon_code" value="" class="form-control %coupon_code_err%" />
                              <ul class="note">
                                <li>%coupon_code_caption%をお持ちの方は、ここに8桁の半角英数字で入力してください</li>
                              </ul>
                            </div>

                            <div class="form-group">
                              <div class="row">
                                <div class="col-12 col-xl-4">
                                  <label for="agree">利用規約</label>
                                </div>
                                <div class="col-12 col-xl-8 mb-5">
                                  <div class="wt_termsbox wt_termsbox_lp">
                                    <div>
                                      <TMPL_INCLUDE NAME="../include/agreement.html">
                                    </div>
                                    <div>
                                      <TMPL_INCLUDE NAME="../include/privacypolicy.html">
                                    </div>
                                  </div>
                                </div>
                                <div class="col-12 text-center">
                                  <h5 class="text-center">規約に同意いただいた方は、「次へすすむ」ボタンを押してください</h5>
                                </div>
                              </div>

                              <div class="text-center mb-5">
                                <input type="submit" value="次へすすむ" class="btn btn-danger rounded-pill wt_btn" onclick="ga('send','event','LP','click','reg_6_toeic_submit');" />
                              </div>

                            </div>
                          </form>

                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

  <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<script src="%static_url%/js/dom.js"></script>
<script src="%static_url%/js/inputlimit.js"></script>
<style>#coupon_code{width:8em;}</style>
</body>
</html>
