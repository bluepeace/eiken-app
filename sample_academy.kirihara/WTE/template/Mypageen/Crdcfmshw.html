<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>カード決済 - <TMPL_INCLUDE NAME="../include/title.html"></title>
<TMPL_INCLUDE NAME="../include/head.html">
<style>
  .wform.wformcfm{padding:25px 0;}
  .wform.wformcfm fieldset,.wform.wformcfm .gbox{margin:0 25px;}
</style>
</head>
<body id="user">

<TMPL_INCLUDE NAME="../include/header.html">
  <div id="sb-site">

    <!-- content section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-xs-12 col-md-8 col-md-offset-2">
            <h1>カード決済</h1>
            <p>以下のご注文に間違いはないでしょうか。問題ないようでしたら「カード決済手続きに進む」を押してください。画面下に決済フォームが表示されます。</p>
            <form target="hss_iframe" id="paypal_form" method="post" action="%paypal_post_url%?cmd=_hosted-payment" class="wform">
              <fieldset>
                <table class="table">
                  <tbody>
                    <tr>
                      <th class="w30">プラン名</th>
                      <td>%pln_title%</td>
                    </tr>
                    <tr>
                      <th>チケット</th>
                      <td>%pln_point_with_comma%回</td>
                    </tr>
                    <tr>
                      <th>料金</th>
                      <td>
                        <TMPL_IF NAME="pln_subscription">月額 </TMPL_IF>
                        %pln_price_with_comma% 円
                      </td>
                    </tr>
                  </tbody>
                </table>
              </fieldset>
              <input type="hidden" name="cmd" value="_hosted-payment">
              <input type="hidden" name="currency_code" value="JPY">
              <input type="hidden" name="business" value="%paypal_id%">
              <input type="hidden" name="item_name" value="%pln_id%">
              <input type="hidden" name="subtotal" value="%crd_price%">
              <input type="hidden" name="return" value="%CGI_URL%?m=crdcptset&amp;pkey=%pkey%&amp;crd_id=%crd_id%&amp;member_id=%member_id%">
              <input type="hidden" name="cancel_return" value="%CGI_URL%?m=crdcclset&amp;pkey=%pkey%&amp;crd_id=%crd_id%&amp;member_id=%member_id%">
              <input type="hidden" name="notify_url" value="%CGI_DIR_URL%/paypalipn.cgi">
              <input type="hidden" name="invoice" value="%crd_id%">
              <input type="hidden" name="custom" value="%crd_id%-%member_id%-%pln_id%">
              <input type="hidden" name="billing_first_name" value="%member_firstname%">
              <input type="hidden" name="billing_last_name" value="%member_lastname%">
              <input type="hidden" name="billing_zip" value="%member_zip1%-%member_zip2%" id="billing_zip">
              <input type="hidden" name="billing_country" value="JP">
              <input type="hidden" name="billing_state" value="%member_addr1%" id="billing_state">
              <input type="hidden" name="billing_city" value="%member_addr2%" id="billing_city">
              <input type="hidden" name="billing_address1" value="%member_addr3%%member_addr4%" id="billing_address1">
              <input type="hidden" name="template" value="templateD" />
              <input type="hidden" name="showHostedThankyouPage" value="false">
              <div class="text-center">
                <input type="submit" value="カード決済手続きに進む" id="call_paypal_btn" class="btn btn-primary" />
              </div>
              <div class="text-center">
                <input type="button" value="プランを修正する" onclick="document.location.href='%CGI_URL%?m=crdfrmshw&amp;pkey=%pkey%';" class="btn btn-link" />
              </div>

              <div id="hss_iframe_cont" style="display:none;">
                <div class="gbox">※<strong>「今すぐ支払う」</strong>ボタンを押すとすぐに決済が行われます<br />※画面の切り替わりに時間がかかることがありますが、複数回クリックするとエラーの原因となりますのでご注意ください</div>

                <div class="text-center" style="margin:0 -45px 0 -25px;">
                  <iframe id="hss_iframe" name="hss_iframe" width="100%" height="500px" frameborder="0" scrolling="no"></iframe>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
  <script>
  (function () {
    var billing_state = $("#billing_state").val();
    var billing_city = $("#billing_city").val();
    var billing_zip = $("#billing_zip").val();
    var billing_address1 = $("#billing_address1").val();
    if(billing_zip == "-" || billing_state == "" || billing_city == "" || billing_address1 == "") {
      $("#billing_zip").val("150-0002");
      $("#billing_state").val("東京都");
      $("#billing_city").val("渋谷区");
      $("#billing_address1").val("渋谷2-15-1 渋谷クロスタワー32F");
    }

    var called = false;
    var form_el = $("#paypal_form");
    var btn_el = $("#call_paypal_btn");
    var iframe_cont_el = $("#hss_iframe_cont");
    form_el.submit(function() {
      if( called === false ) {
        called = true;
        btn_el.attr("value", "処理中...");
        btn_el.attr("disabled", "disabled");
        return true;
      } else {
        return false;
      }
    });
    var iframe_el = $("#hss_iframe");
    window.onload = function() {
      iframe_el.load(function() {
        btn_el.attr("value", "表示完了");
        iframe_cont_el.attr("style", "display:block;");
      });
    };

  })();
  </script>
</body>
</html>
