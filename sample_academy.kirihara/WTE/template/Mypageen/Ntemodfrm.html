<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>%member_caption%メモ編集 - <TMPL_INCLUDE NAME="../include/title.html"></title>
<TMPL_INCLUDE NAME="../include/head.html">
</head>
<body id="user">

<TMPL_INCLUDE NAME="../include/header.html">
  <div id="sb-site">

    <!-- content section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-xs-12 col-md-8 col-md-offset-2">
            <h1>%member_caption%メモ編集</h1>
            <p>自分用のメモにご利用ください。こちらに記載した内容はダッシュボードに表示されます。</p>
            <form method="post" action="%CGI_URL%" class="wform">
              <input type="hidden" name="m" value="ntemodset" />
              <input type="hidden" name="pkey" value="%pkey%" />
              <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>

              <div class="form-group">
                <label for="member_note">メモ編集</label>
                <textarea id="member_note" name="member_note" class="form-control">%member_note%</textarea>
                <ul class="note">
                  <li>1000文字以内</li>
                </ul>
              </div>
              <div class="text-center"><input type="submit" value="登録" name="setBtn" class="btn btn-primary" /></div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
</body>
</html>
