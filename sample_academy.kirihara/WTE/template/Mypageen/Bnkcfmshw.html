<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>銀行口座振込 - <TMPL_INCLUDE NAME="../include/title.html"></title>
<TMPL_INCLUDE NAME="../include/head.html">
</head>
<body id="user">

<TMPL_INCLUDE NAME="../include/header.html">
  <div id="sb-site">

    <!-- content section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-xs-12 col-md-8 col-md-offset-2">
            <h1>銀行口座振込</h1>
            <p>以下の内容でよろしいですか。問題なければ「送信」ボタンを押してください。</p>
            <form method="post" action="%CGI_URL%" class="wform">
              <input type="hidden" name="m" value="bnkcptset" />
              <input type="hidden" name="pkey" value="%pkey%" />
              <table class="table">
                <tbody>
                  <tr>
                    <th class="w30">プラン</th>
                    <td>%pln_title%（チケット数：%pln_point_with_comma%回／金額：%pln_price_with_comma% 円）</td>
                  </tr>
                  <tr>
                    <th>お振込名（カナ）</th>
                    <td>%kana%</td>
                  </tr>
                  <tr>
                    <th>お振込予定日</th>
                    <td>%date%</td>
                  </tr>
                  <tr>
                    <th>備考</th>
                    <td>%note%</td>
                  </tr>
                </tbody>
              </table>
              <div class="text-center">
                <input type="submit" name="setBtn" value="送信する" class="btn btn-primary" />
              </div>
              <div class="text-center">
                <input type="button" name="backBtn" value="&laquo; 入力内容を修正する" onclick="javascript:document.location.href='%CGI_URL%?m=bnkfrmshw&amp;pkey=%pkey%'" class="btn btn-link" />
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
</body>
</html>
