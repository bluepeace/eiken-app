<body id="user" class="drawer drawer--right">
  <TMPL_INCLUDE NAME="../include/body.html">
  <TMPL_INCLUDE NAME="../include/header.html">

  <main role="main" class="wt_main">

    <section class="wt_headvis wt_head_contact">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <h1>体験レッスンのお申込み</h1>
          </div>
        </div>
      </div>
    </section>

    <section id="register">
            <div class="container">
                <div class="row">
                    <div class="col-12 col-md-10 offset-md-1 col-lg-8 offset-lg-2 wt_form">
                        <h2 class="text-center">体験レッスンの<strong class="txt_kiri">ご予約</strong>はこちら</h2>
                        <p class="mb-5 text-lg-center">マイページの開設が完了いたしました。<br>ログインし、体験レッスンのご予約をお願いいたします。</p>
                        <p class="mb-5 text-lg-center">※初回ログイン時に、1分で終わる簡単なアンケートがあります。</p>
                        <form action="%ssl_host_url%/WTE/mypage.cgi" method="post">
                          <input type="hidden" name="m" value="athlinsmt" />
                          <input type="hidden" name="s" value="%session_seller_id%" />
                          <input type="hidden" name="target" value="%target%" />
                          <input type="hidden" name="redirect" value="%redirect%" />
                          <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>

                          <div class="form-group">
                            <label for="member_email" class="%member_email_err% required">メールアドレス</label>
                            <input type="email" id="member_email" name="member_email" value="%member_email%" class="form-control inputlimit_ascii %member_email_err%" placeholder="（例）kirihara@example.com" />
                          </div>
                               
                          <div class="form-group mb-5">
                            <label for="member_pass" class="%member_pass_err% required">パスワード</label>
                            <input type="password" id="member_pass" name="member_pass" value="%member_pass%" class="form-control %member_pass_err%" placeholder="パスワードを入力してください" />
                          </div>

                          <fieldset class="form-group">
                            <div class="form-check">
                              <label for="auto_login_enable"><input type="checkbox" id="auto_login_enable" name="auto_login_enable" value="1" />次回から自動でログイン</label>
                            </div>
                          </fieldset>

                          <div class="text-center mb-5">
                            <input type="submit" value="ログイン" class="btn btn-secondary wt_btn rounded-pill" />
                          </div>
                          
                        </form>
                         
                          <p class="mb-5 text-center"><a href="%ssl_host_url%/WTE/pwdrst.cgi"><span class="fas fa-caret-right"></span>パスワードを忘れた方はこちら</a></p>
                        
                    </div>
                </div>
            </div>
        </section>
    </main>

  <!-- foot section -->
